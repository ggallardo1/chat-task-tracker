services:
  db:
    image: postgres:16
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: chat_tasks
    ports:
      - "5432:5432"
    # 1. Add Healthcheck to let other services know when DB is actually ready
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d chat_tasks"]
      interval: 3s
      timeout: 3s
      retries: 10

  backend:
    build:
      context: ./app/backend
      dockerfile: Dockerfile
    # 2. Add the condition to wait for the healthcheck to pass
    depends_on:
      db:
        condition: service_healthy
    env_file:
      - .env
    ports:
      - "3000:3000"

  frontend:
    build:
      context: ./app/frontend
      dockerfile: Dockerfile
    ports:
      - "5173:5173"
    depends_on:
      - backend
